amcl:
  ros__parameters:
    use_sim_time: false
    base_frame_id: base_link
    odom_frame_id: odom
    scan_topic: /scan
    transform_tolerance: 1.0
    max_particles: 1000
    min_particles: 200
    alpha1: 0.2
    alpha2: 0.2
    alpha3: 0.2
    alpha4: 0.2
    laser_max_range: 10.0
    laser_min_range: -1.0
    laser_max_beams: 60

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    expected_planner_frequency: 1.0
    action_server_result_timeout: 300.0
    wait_for_service_timeout: 60
    server_response_timeout: 60.0
    default_nav_to_pose_bt_xml: "/home/kimyeese/navigate_to_pose_custom.xml"

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 5.0

    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.02
      movement_time_allowance: 30.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.10
      yaw_goal_tolerance: 0.25
      stateful: true

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.2
      lookahead_dist: 0.3
      min_lookahead_dist: 0.2
      max_lookahead_dist: 0.6
      use_velocity_scaled_lookahead_dist: false
      max_angular_accel: 3.2
      transform_tolerance: 1.0
      use_collision_detection: false
      max_robot_pose_search_dist: 10.0

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 1.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner::NavfnPlanner"
      tolerance: 0.5
      use_astar: true
      allow_unknown: true

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      transform_tolerance: 1.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 10
      height: 10
      resolution: 0.05
      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          clearing: true
          marking: true
          data_type: "LaserScan"
          obstacle_min_range: 0.3
          obstacle_max_range: 3.0
          raytrace_min_range: 0.3
          raytrace_max_range: 3.5
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.3

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      transform_tolerance: 1.0  
      global_frame: map
      robot_base_frame: base_link
      plugins: ["static_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.3

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: "/mnt/c/Users/kimye/OneDrive/CSkim/26-1/Industry-safety-robot/ros2/factory_map.yaml"

collision_monitor:
  ros__parameters:
    use_sim_time: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_nav"
    cmd_vel_out_topic: "cmd_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 2.0
    source_timeout: 5.0
    base_shift_correction: true
    stop_pub_timeout: 2.0
    polygons: ["StopZone"]
    StopZone:
      type: "circle"
      radius: 0.1        
      action_type: "stop"
      min_points: 4    
      visualize: true
      polygon_pub_topic: "polygon_stop"
    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "/scan"

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: false
    autostart: true
    node_names:
      - controller_server
      - smoother_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
      - collision_monitor


docking_server:
  ros__parameters:
    use_sim_time: false
    dock_plugins: ["simple_charging_dock"]
    simple_charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      use_external_detection_pose: false
      use_battery_status: false

waypoint_follower:
  ros__parameters:
    stop_on_failure: false